services:
  postgres:
    image: postgres:17
    container_name: notification-platform-postgres
    environment:
      POSTGRES_DB: notification_platform
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8
    container_name: notification-platform-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.131.0
    container_name: notification-platform-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    volumes:
      # This local collector config file must also exist.
      - ./deployments/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: notification-platform-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      # This local Prometheus config file must also exist.
      - ./deployments/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      otel-collector:
        condition: service_started

  grafana:
    image: grafana/grafana:12.1.1
    container_name: notification-platform-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

  jaeger:
    image: jaegertracing/jaeger:2.8.0
    container_name: notification-platform-jaeger
    ports:
      - "16686:16686"
      - "4319:4317"

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
